<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vAIrity | Truth Fidelity System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">v<span>AI</span>rity</div>
            <div class="menu-icons">
                <div class="icon active">▦</div>
                <div class="icon">△</div>
                <div class="icon">📄</div>
            </div>
            <div class="my-inquiries">
                <div class="section-header">
                    <span>My Inquiries</span>
                    <button class="add-btn">+</button>
                </div>
                <p class="empty-text">No recent inquiries.</p>
            </div>
            <div class="sidebar-footer">
                <div class="icon">⚙</div>
                <div class="icon">?</div>
            </div>
        </nav>

        <main class="chat-section">
            <header class="chat-header">
                <div class="tab">New Inquiry <span>×</span></div>
            </header>
            
            <div class="chat-window" id="chatWindow">
                <div class="welcome-screen">
                    <h2>Welcome to vAIrity</h2>
                    <p>Start a new inquiry to verify information fidelity.</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask anything to verify...">
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
                <span class="feedback-link">Feedback</span>
            </div>
        </main>

        <aside class="sources-panel">
            <h3>Sources & Credibility</h3>
            <div class="empty-sources">
                <p>Submit an inquiry to see vAIrified™ sources and TFS scores.</p>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
